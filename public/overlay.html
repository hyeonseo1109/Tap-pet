<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 160px;
        height: 160px;
        background: transparent;
        overflow: hidden;
      }
      #pet {
        position: absolute;
        bottom: 0;
        right: 0;
        width: 52px;
        height: 64px;
        background-image: url("/idle.png");
        background-repeat: no-repeat;
        image-rendering: pixelated;
        transform: scale(1.5);
        transform-origin: bottom right;
        cursor: grab;
      }
    </style>
  </head>
  <body>
    <div id="pet"></div>
    <script type="module">
      import { listen, emit } from "https://esm.sh/@tauri-apps/api@2/event";
      import { invoke } from "https://esm.sh/@tauri-apps/api@2/core";
      import { getCursorPosition } from "https://esm.sh/@tauri-apps/api@2/window";

      const pet = document.getElementById("pet");

      const FRAME_WIDTH = 52;
      const FRAME_HEIGHT = 64;
      const TOTAL_FRAMES = 4;
      const STAGE_ROW = { egg: 0, baby: 1, child: 2, adult: 3 };

      let frame = 0;
      let lastFrameTime = 0;
      let animSpeed = 220;
      let currentStage = "egg";
      let currentState = "idle";

      // 스프라이트 업데이트
      function updateSprite() {
        const y = (STAGE_ROW[currentStage] ?? 0) * FRAME_HEIGHT;
        const x = frame * FRAME_WIDTH;
        const src = currentState === "typing" ? "/typing.png" : "/idle.png";
        pet.style.backgroundImage = `url('${src}')`;
        pet.style.backgroundPosition = `-${x}px -${y}px`;
      }

      // 애니메이션 루프
      function animate(time) {
        if (time - lastFrameTime >= animSpeed) {
          frame = (frame + 1) % TOTAL_FRAMES;
          lastFrameTime = time;
          updateSprite();
        }
        requestAnimationFrame(animate);
      }
      requestAnimationFrame(animate);

      // 메인 앱에서 펫 상태 수신
      await listen("pet-state", (event) => {
        const { stage, state, speed } = event.payload;
        if (stage) currentStage = stage;
        if (state) currentState = state;
        if (speed) animSpeed = speed;
      });

      // 글로벌 키입력 수신 (백그라운드에서도 동작)
      let typingTimer = null;
      await listen("global-keypress", () => {
        currentState = "typing";
        animSpeed = 100;
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => {
          currentState = "idle";
          animSpeed = 220;
        }, 500);
      });

      // 드래그
      let isDragging = false;
      let startX, startY;

      pet.addEventListener("mousedown", (e) => {
        isDragging = true;
        startX = e.screenX;
        startY = e.screenY;
        pet.style.cursor = "grabbing";
      });

      window.addEventListener("mousemove", async (e) => {
        if (!isDragging) return;
        const dx = e.screenX - startX;
        const dy = e.screenY - startY;
        startX = e.screenX;
        startY = e.screenY;
        await invoke("move_overlay_by", { dx, dy });
      });

      window.addEventListener("mouseup", () => {
        isDragging = false;
        pet.style.cursor = "grab";
      });

      // 호버 시 X 버튼
      pet.addEventListener("mouseenter", () => {
        const btn = document.getElementById("close-btn");
        if (btn) btn.style.opacity = "1";
      });
      pet.addEventListener("mouseleave", (e) => {
        const btn = document.getElementById("close-btn");
        if (btn && !btn.contains(e.relatedTarget)) btn.style.opacity = "0";
      });
    </script>

    <button
      id="close-btn"
      style="
        position: absolute;
        top: 0;
        right: 0;
        width: 16px;
        height: 16px;
        background: #b95749;
        border: 1px solid #4b2b1d;
        color: white;
        font-size: 9px;
        cursor: pointer;
        opacity: 0;
        transition: opacity 150ms;
        display: flex;
        align-items: center;
        justify-content: center;
      "
      onclick="invoke('set_overlay_visible', { visible: false })"
    >
      ✕
    </button>
  </body>
</html>
